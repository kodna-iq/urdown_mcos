workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Flutter config only
        script: |
          flutter build macos --config-only --release || true

      - name: Pod install
        script: |
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          echo "✅ Pod install done"

      - name: Fix PODS_ROOT and xcfilelists
        script: |
          PODS_ROOT_ABS="$PWD/macos/Pods"
          XCCONFIG="macos/Flutter/ephemeral/Flutter-Generated.xcconfig"

          # Inject PODS_ROOT into Flutter-Generated.xcconfig so Xcode can resolve it
          grep -q "^PODS_ROOT=" "$XCCONFIG" || \
            echo "PODS_ROOT=$PODS_ROOT_ABS" >> "$XCCONFIG"
          grep -q "^PODS_CONFIGURATION_BUILD_DIR=" "$XCCONFIG" || \
            echo "PODS_CONFIGURATION_BUILD_DIR=$PODS_ROOT_ABS/Build/Products/Release" >> "$XCCONFIG"

          echo "✅ Flutter-Generated.xcconfig PODS entries:"
          grep PODS "$XCCONFIG"

          # Create all xcfilelist files in the correct absolute path Xcode expects
          XCFILELIST_DIR="$PODS_ROOT_ABS/Target Support Files/Pods-Runner"
          mkdir -p "$XCFILELIST_DIR"
          for f in \
            "Pods-Runner-frameworks-Debug-input-files.xcfilelist" \
            "Pods-Runner-frameworks-Debug-output-files.xcfilelist" \
            "Pods-Runner-frameworks-Release-input-files.xcfilelist" \
            "Pods-Runner-frameworks-Release-output-files.xcfilelist" \
            "Pods-Runner-resources-Debug-input-files.xcfilelist" \
            "Pods-Runner-resources-Debug-output-files.xcfilelist" \
            "Pods-Runner-resources-Release-input-files.xcfilelist" \
            "Pods-Runner-resources-Release-output-files.xcfilelist"; do
            [ -f "$XCFILELIST_DIR/$f" ] || touch "$XCFILELIST_DIR/$f"
          done

          echo "✅ xcfilelists created at: $XCFILELIST_DIR"
          ls "$XCFILELIST_DIR/"

      - name: Build macOS
        script: |
          flutter build macos --release

    artifacts:
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
