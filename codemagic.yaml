workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Flutter config only
        script: |
          flutter build macos --config-only --release || true

      - name: Pod install
        script: |
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Fix PODS_ROOT in project.pbxproj
        script: |
          PODS_ABS="$PWD/macos/Pods"
          PBXPROJ="macos/Runner.xcodeproj/project.pbxproj"
          echo "PODS_ABS = $PODS_ABS"
          echo "=== xcfilelist refs before fix ==="
          grep "xcfilelist" "$PBXPROJ" || echo "none found"
          python3 - << PYEOF
          import re, pathlib, os
          pods_abs = os.environ.get('PODS_ABS', '$PWD/macos/Pods')
          pbx = pathlib.Path('macos/Runner.xcodeproj/project.pbxproj')
          text = pbx.read_text()
          # Fix: replace "\$(PODS_ROOT)" with absolute path
          fixed = text.replace('"$(PODS_ROOT)/Target Support Files/', f'"{pods_abs}/Target Support Files/')
          fixed = fixed.replace('"${PODS_ROOT}/Target Support Files/', f'"{pods_abs}/Target Support Files/')
          # Also fix relative paths
          fixed = fixed.replace('"Target Support Files/Pods-Runner/', f'"{pods_abs}/Target Support Files/Pods-Runner/')
          if fixed != text:
              pbx.write_text(fixed)
              print("Fixed PODS_ROOT references in project.pbxproj")
          else:
              print("No PODS_ROOT references found - checking what's there:")
              for line in text.splitlines():
                  if 'xcfilelist' in line or 'Target Support' in line:
                      print(f"  {line.strip()}")
          PYEOF
          echo "=== xcfilelist refs after fix ==="
          grep "xcfilelist" "$PBXPROJ" || echo "none found"

      - name: Build macOS
        script: |
          flutter build macos --release

    artifacts:
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
