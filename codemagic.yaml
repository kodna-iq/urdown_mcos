workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Flutter config only
        script: |
          flutter build macos --config-only --release || true

      - name: Pod install
        script: |
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          echo "✅ Pod install done"
          echo "📂 Pods xcconfig files:"
          ls "Pods/Target Support Files/Pods-Runner/" 2>/dev/null || echo "No xcconfig dir found"

      - name: Verify and patch xcfilelists
        script: |
          PODS_DIR="$PWD/macos/Pods/Target Support Files/Pods-Runner"

          # Create any missing xcfilelist files (safety net)
          mkdir -p "$PODS_DIR"
          for config in Debug Release; do
            for type in input output; do
              f="$PODS_DIR/Pods-Runner-frameworks-${config}-${type}-files.xcfilelist"
              [ -f "$f" ] || { touch "$f"; echo "Created: $f"; }
              f="$PODS_DIR/Pods-Runner-resources-${config}-${type}-files.xcfilelist"
              [ -f "$f" ] || { touch "$f"; echo "Created: $f"; }
            done
          done

          echo "✅ xcfilelist files:"
          ls "$PODS_DIR/"*.xcfilelist 2>/dev/null

          echo ""
          echo "✅ Pods-Runner xcconfig files:"
          ls "$PODS_DIR/"*.xcconfig 2>/dev/null || echo "⚠️ No xcconfig found - pod install may have failed"

      - name: Build macOS
        script: |
          flutter build macos --release

    artifacts:
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
