workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
          flutter precache --macos

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        script: |
          set -e

          # 1. Generate Flutter ephemeral files (Flutter-Generated.xcconfig, plugin registrant, etc.)
          flutter build macos --config-only --release

          # 2. Show what was generated (for debug)
          echo "=== GeneratedPluginRegistrant.swift ==="
          cat macos/Flutter/GeneratedPluginRegistrant.swift
          echo "=== Flutter-Generated.xcconfig ==="
          cat macos/Flutter/ephemeral/Flutter-Generated.xcconfig || true

          # 3. Install CocoaPods with full plugin list now available
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          echo "✅ pod install done"
          cd ..

          # 4. Build with xcodebuild (skip flutter's internal pod install)
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/macos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

          # 5. Package
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "App found: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r --symlinks urdown.app.zip "$(basename "$APP_PATH")"
          echo "✅ Build complete and zipped"

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
