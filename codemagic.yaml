workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Fix xcfilelist and build
        script: |
          # Step 1: Run flutter config only to generate Flutter files
          flutter build macos --config-only --release || true

          # Step 2: Pod install
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update

          # Step 3: Create any missing xcfilelist files
          XCFL="Pods/Target Support Files/Pods-Runner"
          mkdir -p "$XCFL"
          for cfg in Debug Release Profile; do
            for t in input output; do
              f="$XCFL/Pods-Runner-frameworks-${cfg}-${t}-files.xcfilelist"
              [ -f "$f" ] || touch "$f"
              r="$XCFL/Pods-Runner-resources-${cfg}-${t}-files.xcfilelist"
              [ -f "$r" ] || touch "$r"
            done
          done
          echo "✅ xcfilelist files ready:"
          ls "$XCFL/"
          cd ..

          # Step 4: Build with flutter (uses existing pod install)
          flutter build macos --release

    artifacts:
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
