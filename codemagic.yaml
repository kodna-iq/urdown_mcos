workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
          flutter precache --macos

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Pod install
        script: |
          set -e
          flutter build macos --config-only --release
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          echo "✅ Pods installed"

      - name: Build macOS
        script: |
          set -e
          # Get the real Flutter root from flutter itself
          FLUTTER_ROOT=$(flutter --version --machine 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('flutterRoot',''))" 2>/dev/null || true)

          # Fallback: find via which flutter -> resolve symlink -> go up
          if [ -z "$FLUTTER_ROOT" ] || [ ! -f "$FLUTTER_ROOT/packages/flutter_tools/bin/macos_assemble.sh" ]; then
            FLUTTER_BIN=$(which flutter)
            FLUTTER_REAL=$(readlink -f "$FLUTTER_BIN" 2>/dev/null || realpath "$FLUTTER_BIN")
            FLUTTER_ROOT=$(dirname $(dirname "$FLUTTER_REAL"))
          fi

          echo "✅ FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "✅ macos_assemble.sh exists: $(ls $FLUTTER_ROOT/packages/flutter_tools/bin/macos_assemble.sh 2>/dev/null && echo YES || echo NO)"

          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/macos \
            FLUTTER_ROOT="$FLUTTER_ROOT" \
            FLUTTER_APPLICATION_PATH="$(pwd)" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
