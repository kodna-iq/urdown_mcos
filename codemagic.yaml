workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
          flutter precache --macos

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        script: |
          set -e

          # 1. Generate Flutter ephemeral files (Podfile needs Flutter-Generated.xcconfig)
          flutter build macos --config-only --release

          # 2. Pre-install pods manually
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          PODS_ABS="$PWD/Pods"
          cd ..

          # 3. Patch [CP] Embed Pods Frameworks in pbxproj
          #    After pod install, the pbxproj gets a new build phase with $(PODS_ROOT)/...
          #    Flutter's internal pod install re-adds it with a broken PODS_ROOT="/".
          #    Fix: replace all $(PODS_ROOT) references with the absolute path.
          python3 << PYEOF
          import re, pathlib, os, sys
          pbx = pathlib.Path('macos/Runner.xcodeproj/project.pbxproj')
          pods_abs = os.path.abspath('macos/Pods')
          text = pbx.read_text()
          original = text

          # Replace ALL forms of PODS_ROOT reference with absolute path
          text = text.replace('"$(PODS_ROOT)/Target Support Files/', f'"{pods_abs}/Target Support Files/')
          text = text.replace('"${PODS_ROOT}/Target Support Files/', f'"{pods_abs}/Target Support Files/')
          text = re.sub(r'"?\$[({]PODS_ROOT[)}]/Target Support Files/', f'"{pods_abs}/Target Support Files/', text)

          # Also patch PODS_ROOT setting itself to absolute path
          text = re.sub(
              r'(PODS_ROOT = )"?\$\(inherited\)";',
              f'\\1"{pods_abs}";',
              text
          )
          text = re.sub(
              r'(PODS_PODFILE_DIR_PATH = )"?\$\(inherited\)";',
              f'\\1"{os.path.abspath("macos")}";',
              text
          )

          if text != original:
              pbx.write_text(text)
              print(f"✅ Patched project.pbxproj — PODS_ROOT → {pods_abs}")
          else:
              print("ℹ️  No PODS_ROOT references found in pbxproj (pod install may not have added them yet)")

          # Verify xcfilelist files exist
          xcfl = pathlib.Path(f'{pods_abs}/Target Support Files/Pods-Runner')
          xcfl.mkdir(parents=True, exist_ok=True)
          for cfg in ['Debug', 'Release', 'Profile']:
              for t in ['input', 'output']:
                  f = xcfl / f'Pods-Runner-frameworks-{cfg}-{t}-files.xcfilelist'
                  if not f.exists():
                      f.write_text('')
                      print(f"Created: {f}")
          print("✅ xcfilelist files verified")
          PYEOF

          # 4. Build — flutter will re-run pod install internally (740ms fast path)
          #    but our pbxproj patch stays because flutter doesn't rewrite pbxproj
          flutter build macos --release

          # 5. Package
          APP=build/macos/Build/Products/Release/Runner.app
          if [ ! -d "$APP" ]; then
            echo "❌ Runner.app not found, searching..."
            find build/macos -name "*.app" -type d | head -5
            exit 1
          fi
          echo "✅ App size: $(du -sh $APP)"
          cd build/macos/Build/Products/Release
          zip -r --symlinks urdown.app.zip Runner.app
          echo "✅ ZIP: $(du -sh urdown.app.zip)"

    artifacts:
      - build/macos/Build/Products/Release/urdown.app.zip
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
