workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
          flutter precache --macos

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        script: |
          set -e

          # Step 1: Generate Flutter ephemeral files (needed by Podfile to find flutter_root)
          flutter build macos --config-only --release

          # Step 2: Install pods — creates xcfilelist files via post_install hook
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

          # Step 3: Build Universal Binary (arm64 + x86_64) — works on Apple Silicon AND Intel/VirtualBox
          export FLUTTER_XCODE_ARCHS="arm64 x86_64"
          flutter build macos --release

          # Step 4: Verify and package
          APP=build/macos/Build/Products/Release/Runner.app
          echo "App size: $(du -sh $APP)"
          echo "Frameworks: $(ls $APP/Contents/Frameworks/ | head -5)"
          cd build/macos/Build/Products/Release
          zip -r --symlinks urdown.app.zip Runner.app
          echo "✅ ZIP size: $(du -sh urdown.app.zip)"

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
