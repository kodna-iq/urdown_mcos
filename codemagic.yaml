workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Setup Flutter engine config
        script: |
          flutter build macos --config-only --release || true

      - name: Pod install with xcfilelist fix
        script: |
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          echo "=== Verifying xcfilelist files ==="
          XCFL="Pods/Target Support Files/Pods-Runner"
          ls -la "$XCFL/" 2>/dev/null || echo "Dir not found, creating..."
          mkdir -p "$XCFL"
          for cfg in Debug Release; do
            for t in input output; do
              f="$XCFL/Pods-Runner-frameworks-${cfg}-${t}-files.xcfilelist"
              [ -f "$f" ] || { touch "$f"; echo "Created: $f"; }
            done
          done
          ls -la "$XCFL/"

      - name: Build macOS
        script: |
          cd macos
          PODS_ROOT="$PWD/Pods" \
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath "$PWD/../build/macos/DerivedData" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PODS_ROOT="$PWD/Pods"
          echo "=== Finding .app ==="
          find ../build/macos/DerivedData -name "*.app" -type d | head -5

      - name: Package app
        script: |
          APP=$(find build/macos/DerivedData -name "*.app" -type d | head -1)
          echo "Found: $APP"
          mkdir -p build/macos/Build/Products/Release
          cp -r "$APP" build/macos/Build/Products/Release/
          cd build/macos/Build/Products/Release
          zip -r urdown_macos.zip *.app
          ls -lh urdown_macos.zip

    artifacts:
      - build/macos/Build/Products/Release/urdown_macos.zip

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
