workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
          flutter precache --macos

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        script: |
          set -e

          # Step 1: Generate Flutter ephemeral files
          flutter build macos --config-only --release

          # Step 2: Pod install — creates xcfilelist files via post_install hook
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update

          # Step 3: Patch PODS_ROOT in pbxproj before flutter build
          #         flutter build re-runs pod install internally (fast path)
          #         which adds [CP] Embed Pods Frameworks with broken $(PODS_ROOT)="/"
          PODS_ABS="$PWD/Pods"
          cd ..
          python3 << PYEOF
          import re, pathlib, os
          pods_abs = os.path.abspath('macos/Pods')
          pbx = pathlib.Path('macos/Runner.xcodeproj/project.pbxproj')
          text = pbx.read_text()
          original = text
          # Fix PODS_ROOT variable value in build settings
          text = re.sub(r'(PODS_ROOT = )"?\$\(inherited\)";', f'\\1"{pods_abs}";', text)
          text = re.sub(r'(PODS_PODFILE_DIR_PATH = )"?\$\(inherited\)";',
                        f'\\1"{os.path.abspath("macos")}";', text)
          # Fix xcfilelist path references
          text = text.replace('"$(PODS_ROOT)/Target Support Files/',
                              f'"{pods_abs}/Target Support Files/')
          text = text.replace('"${PODS_ROOT}/Target Support Files/',
                              f'"{pods_abs}/Target Support Files/')
          if text != original:
              pbx.write_text(text)
              print(f"Patched pbxproj PODS_ROOT → {pods_abs}")
          else:
              print("No PODS_ROOT to patch (pod install hasn't added CP phase yet)")
          # Ensure xcfilelist files exist
          xcfl = pathlib.Path(f'{pods_abs}/Target Support Files/Pods-Runner')
          xcfl.mkdir(parents=True, exist_ok=True)
          for cfg in ['Debug', 'Release', 'Profile']:
              for t in ['input', 'output']:
                  f = xcfl / f'Pods-Runner-frameworks-{cfg}-{t}-files.xcfilelist'
                  if not f.exists():
                      f.write_text('')
          print("xcfilelist files verified")
          PYEOF

          # Step 4: Build
          flutter build macos --release

          # Step 5: Package — rename Runner.app → UrDown.app
          RELEASE="build/macos/Build/Products/Release"
          if [ -d "$RELEASE/Runner.app" ]; then
            mv "$RELEASE/Runner.app" "$RELEASE/UrDown.app"
            echo "Renamed Runner.app → UrDown.app"
          fi
          APP=$(ls -d "$RELEASE"/*.app 2>/dev/null | head -1)
          echo "✅ App: $APP ($(du -sh $APP | cut -f1))"
          cd "$RELEASE"
          zip -r --symlinks urdown.app.zip "$(basename $APP)"
          echo "✅ ZIP: $(du -sh urdown.app.zip | cut -f1)"

    artifacts:
      - build/macos/Build/Products/Release/urdown.app.zip

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
