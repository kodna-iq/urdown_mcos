workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: 1.14.3
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe
          ls -lh assets/binaries/macos/

      # FIXED: Do NOT delete the macos/ folder. It contains custom
      # MainFlutterWindow.swift, Main.storyboard, AppIcon assets, and
      # Info.plist. Wiping it with flutter create replaces everything with
      # a stock template → blank window + wrong icon on every build.
      # We only overwrite the entitlement files and patch the Podfile.
      - name: Restore macOS entitlements
        script: |
          cat > macos/Runner/DebugProfile.entitlements << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <false/>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.network.server</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
            <key>com.apple.security.files.downloads.read-write</key>
            <true/>
          </dict>
          </plist>
          ENTEOF
          cat > macos/Runner/Release.entitlements << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <false/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
            <key>com.apple.security.files.downloads.read-write</key>
            <true/>
          </dict>
          </plist>
          ENTEOF

      # FIX: Remove the RunnerTests target from Podfile.
      # Runner.xcodeproj has no RunnerTests PBXNativeTarget, so CocoaPods
      # aborts with "[!] Unable to find a target named `RunnerTests`".
      - name: Fix Podfile — remove missing RunnerTests target
        script: |
          python3 - << 'PYEOF'
          import re, pathlib
          podfile = pathlib.Path('macos/Podfile')
          text = podfile.read_text()
          # Remove the RunnerTests target block (including its `inherit!` line)
          cleaned = re.sub(
              r'\s*target\s+[\'"]RunnerTests[\'"]\s+do.*?end',
              '',
              text,
              flags=re.DOTALL,
          )
          podfile.write_text(cleaned)
          print("Podfile patched — RunnerTests block removed")
          PYEOF

      # FIX: Bump macOS deployment target to 10.15 in both Podfile and
      # project.pbxproj.
      # audioplayers_darwin 6.x (and several other modern plugins) require
      # macOS >= 10.15. Without this patch, pod install fails with:
      #   [!] CocoaPods could not find compatible versions for pod
      #   "audioplayers_darwin" … required a higher minimum deployment target.
      - name: Fix deployment target — bump to 10.15
        script: |
          python3 - << 'PYEOF'
          import re, pathlib

          # Patch Podfile platform line
          podfile = pathlib.Path('macos/Podfile')
          text = podfile.read_text()
          patched = re.sub(r"platform :osx, '[0-9.]+'" , "platform :osx, '10.15'", text)
          podfile.write_text(patched)
          print("Podfile platform line →", re.search(r"platform :osx, '[0-9.]+'", patched).group())

          # Patch pbxproj MACOSX_DEPLOYMENT_TARGET
          pbxproj = pathlib.Path('macos/Runner.xcodeproj/project.pbxproj')
          text = pbxproj.read_text()
          patched, n = re.subn(r'MACOSX_DEPLOYMENT_TARGET = [0-9.]+', 'MACOSX_DEPLOYMENT_TARGET = 10.15', text)
          pbxproj.write_text(patched)
          print(f"pbxproj: {n} MACOSX_DEPLOYMENT_TARGET entries set to 10.15")
          PYEOF

      # FIX: Ensure Info.plist has CFBundleIconFile set (fixes wrong/missing icon).
      - name: Fix Info.plist — set CFBundleIconFile
        script: |
          python3 - << 'PYEOF'
          import re, pathlib
          plist = pathlib.Path('macos/Runner/Info.plist')
          text = plist.read_text()
          # Replace empty CFBundleIconFile string with AppIcon
          fixed = re.sub(
              r'(<key>CFBundleIconFile</key>\s*<string>)(</string>)',
              r'\1AppIcon\2',
              text,
          )
          plist.write_text(fixed)
          print("Info.plist patched — CFBundleIconFile set to AppIcon")
          PYEOF

      - name: Generate Isar code
        script: |
          dart run build_runner build \
            --delete-conflicting-outputs


      # FIX: The pbxproj groups Flutter-Debug/Release.xcconfig inside a
      # `path = Configs` group, so Xcode resolves them as
      # Flutter/Configs/Flutter-*.xcconfig. But Flutter only generates these
      # files directly inside Flutter/. Solution: create Flutter/Configs/
      # and write xcconfig files that re-include the generated one at the
      # correct relative path.
      - name: Fix xcconfig paths — create Flutter/Configs/
        script: |
          mkdir -p macos/Flutter/Configs
          printf '#include "../ephemeral/Flutter-Generated.xcconfig"\n'             > macos/Flutter/Configs/Flutter-Release.xcconfig
          printf '#include "../ephemeral/Flutter-Generated.xcconfig"\n'             > macos/Flutter/Configs/Flutter-Debug.xcconfig
          echo "Flutter/Configs/ xcconfig files created ✓"

      - name: Pod install
        script: |
          # Pin gems for CocoaPods compatibility:
          # - activesupport 7.1+ removed 'present?' used by CocoaPods internals
          # - CocoaPods 1.15.x has 'undefined method map for nil' in repo-update
          #   so we pin to 1.14.3 (also set in environment above as a hint,
          #   but gem install here ensures the correct version is active)
          gem install cocoapods -v '1.14.3' --no-document
          gem install xcodeproj -v '1.26.0' --no-document
          gem install activesupport -v '~> 7.0.8' --no-document
          rm -rf macos/Pods macos/Podfile.lock
          # Run repo-update separately so a failure here is easier to diagnose,
          # then install without --repo-update to use the freshly updated cache.
          cd macos && pod repo update && pod install

      - name: Build macOS
        script: |
          # Generate flutter ephemeral files (xcconfig, plugin registrant)
          # without triggering flutter's internal pod install.
          flutter build macos --config-only --release 2>/dev/null || true

          # Build with xcodebuild using the already-installed Pods workspace.
          # This avoids flutter re-running pod install (which would overwrite
          # the Pods/ from our manual step and lose the xcfilelist files).
          xcodebuild             -workspace macos/Runner.xcworkspace             -scheme Runner             -configuration Release             -derivedDataPath build/macos/DerivedData             SYMROOT="$(pwd)/build/macos/Build/Products"             CODE_SIGNING_ALLOWED=NO             | xcpretty || xcodebuild             -workspace macos/Runner.xcworkspace             -scheme Runner             -configuration Release             -derivedDataPath build/macos/DerivedData             SYMROOT="$(pwd)/build/macos/Build/Products"             CODE_SIGNING_ALLOWED=NO

      - name: Package app as zip
        script: |
          echo "=== Searching for .app in all build directories ==="
          find . -name "*.app" -type d 2>/dev/null | head -20
          echo "=== build/macos contents ==="
          find build/macos -maxdepth 6 -type d 2>/dev/null | head -30

          # Try multiple known output paths
          APP_PATH=""
          for DIR in \
            "build/macos/Build/Products/Release" \
            "build/macos/Build/Products/Release-macos" \
            "build/macos/DerivedData/Build/Products/Release" \
            "$(find build -name '*.app' -type d 2>/dev/null | head -1 | xargs dirname 2>/dev/null)"; do
            if [ -d "$DIR" ]; then
              FOUND=$(ls -d "$DIR"/*.app 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                APP_PATH="$FOUND"
                echo "✅ Found app at: $APP_PATH"
                break
              fi
            fi
          done

          if [ -n "$APP_PATH" ]; then
            OUTPUT_DIR=$(dirname "$APP_PATH")
            cd "$OUTPUT_DIR"
            APP_NAME=$(basename "$APP_PATH")
            zip -r "urdown_macos.zip" "$APP_NAME"
            echo "✅ Created urdown_macos.zip"
            ls -lh urdown_macos.zip
          else
            echo "❌ Could not find any .app — full build tree:"
            find build -type d | head -50
          fi

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
      - build/macos/Build/Products/Release/**/*.app
      - build/**/Release/*.app
      - build/**/Release/*.zip
      - "**/*.zip"

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
