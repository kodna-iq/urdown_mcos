workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe
          ls -lh assets/binaries/macos/

      - name: Generate Isar code
        script: |
          dart run build_runner build \
            --delete-conflicting-outputs

      - name: Generate Flutter engine files
        script: |
          flutter build macos --config-only --release || true

      - name: Pod install
        script: |
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update
          echo "=== xcfilelist check ==="
          find Pods -name "*.xcfilelist" | head -20

      - name: Build with xcodebuild
        script: |
          cd macos
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath ../build/macos/DerivedData \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          echo "=== Build output ==="
          find ../build/macos/DerivedData -name "*.app" -type d | head -5

      - name: Copy app to standard location
        script: |
          mkdir -p build/macos/Build/Products/Release
          APP=$(find build/macos/DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            cp -r "$APP" build/macos/Build/Products/Release/
            echo "✅ App copied: $APP"
          else
            echo "❌ No .app found"
            find build/macos -type d | head -20
          fi

    artifacts:
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
