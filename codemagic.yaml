workflows:
  macos-workflow:
    name: macOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Download macOS binaries
        script: |
          mkdir -p assets/binaries/macos
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o assets/binaries/macos/yt-dlp
          chmod +x assets/binaries/macos/yt-dlp
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip \
            -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extracted
          cp /tmp/ffmpeg_extracted/ffmpeg assets/binaries/macos/ffmpeg
          chmod +x assets/binaries/macos/ffmpeg
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip \
            -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_extracted
          cp /tmp/ffprobe_extracted/ffprobe assets/binaries/macos/ffprobe
          chmod +x assets/binaries/macos/ffprobe

      - name: Generate Isar code
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Generate Flutter engine files
        script: |
          flutter build macos --config-only --release || true

      - name: Pod install
        script: |
          cd macos
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Build with xcodebuild
        script: |
          set -exo pipefail
          DERIVED="$PWD/build/macos/DerivedData"
          mkdir -p "$DERIVED"
          cd macos
          echo "=== Working dir: $PWD ==="
          echo "=== Workspace contents ==="
          ls -la
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath "$DERIVED" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcodebuild.log
          echo "=== Exit code: $? ==="
          echo "=== Searching ALL .app locations ==="
          find "$DERIVED" -name "*.app" -type d 2>/dev/null
          find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -type d 2>/dev/null | head -5

      - name: Package app
        script: |
          set -e
          echo "=== Full search for .app ==="
          ALL_APPS=$(find . ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | grep -v ".build" | head -10)
          echo "$ALL_APPS"
          APP=$(echo "$ALL_APPS" | head -1)
          if [ -z "$APP" ]; then
            echo "❌ No .app found anywhere"
            cat /tmp/xcodebuild.log | tail -50
            exit 1
          fi
          echo "✅ Using: $APP"
          mkdir -p build/macos/Build/Products/Release
          cp -r "$APP" build/macos/Build/Products/Release/
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          zip -r urdown_macos.zip "$APP_NAME"
          echo "✅ Created: urdown_macos.zip"
          ls -lh

    artifacts:
      - build/macos/Build/Products/Release/urdown_macos.zip
      - build/macos/Build/Products/Release/*.app

    publishing:
      email:
        recipients:
          - kodna.iq@gmail.com
        notify:
          success: true
          failure: true
